<p-card class="card flex justify-center">
  <div class="container">
    <p-toggleswitch [ngModel]="checked" (ngModelChange)="onThemeChange($event)">
      <ng-template #handle let-checked="checked">
        <i
          [ngClass]="['!text-xs', 'pi', checked ? 'pi-check' : 'pi-times']"
        ></i>
      </ng-template>
    </p-toggleswitch>
    <p-button
      (click)="isNavBarVisible.set(!isNavBarVisible())"
      badgeSeverity="info"
      [raised]="true"
      size="large"
      severity="contrast"
    >
      <i
        [class]="isNavBarVisible() ? 'pi pi-times mr-2' : 'pi pi-bars mr-2'"
      ></i>
      Navigation bar
    </p-button>
  </div>
</p-card>
