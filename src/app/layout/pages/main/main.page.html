<div class="flex flex-col gap-6 p-4">
  <div class="flex justify-center">
    <p-fileupload
      #fu
      mode="basic"
      chooseLabel="Выбрать файл"
      chooseIcon="pi pi-upload"
      name="demo[]"
      url="https://www.primefaces.org/cdn/api/upload.php"
      accept="image/*"
      maxFileSize="1000000"
      (onUpload)="onUpload($event)"
    >
    </p-fileupload>
  </div>

  <!-- Контейнер с контентом -->
  <div
    class="container mx-auto px-4 py-6 bg-gray-50 dark:bg-gray-900 rounded-lg shadow"
  >
    <header
      class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4"
    >
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white">
        Мое портфолио
      </h1>
      <nav class="flex space-x-4">
        <a class="hover:text-blue-600 transition-colors font-medium" href="#"
          >Обо мне</a
        >
        <a class="hover:text-blue-600 transition-colors font-medium" href="#"
          >Проекты</a
        >
        <a class="hover:text-blue-600 transition-colors font-medium" href="#"
          >Контакты</a
        >
      </nav>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4">Приветствие</h2>
        <p class="text-gray-600 dark:text-gray-300">
          Добро пожаловать на мою страницу портфолио! Здесь вы найдете
          информацию о моих проектах и навыках.
        </p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4">Загрузка файлов</h2>
        <p class="text-gray-600 dark:text-gray-300 mb-4">
          Вы можете загрузить файлы с помощью кнопки выше
        </p>
        <!-- Кнопка загрузки -->
        <p-button
          label="Загрузить выбранные файлы"
          (onClick)="fu.upload()"
          severity="secondary"
          icon="pi pi-upload"
          class="w-full md:w-auto"
        >
        </p-button>
      </div>
    </div>
  </div>
</div>
